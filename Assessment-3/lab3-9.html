<!DOCTYPE html>
<html>
  <head>
    <title>Radio Button Color Selector</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      #info {
        font-weight: bold;
        margin-bottom: 20px;
      }
      input[type="radio"] {
        margin-right: 5px;
      }
      #result {
        margin-top: 20px;
        font-weight: bold;
        color: darkred;
      }
    </style>
  </head>
  <body>
    <div id="info">
      Name: UPPALAPATI ASISH VARMA<br>
      Roll No: 24BAI0077
    </div>

    <form id="colorForm">
      <input type="radio" name="color" value="Red" id="red">
      <label for="red">Red</label>

      <input type="radio" name="color" value="Green" id="green">
      <label for="green">Green</label>

      <input type="radio" name="color" value="Blue" id="blue">
      <label for="blue">Blue</label>

      <br><br>
      <button type="button" onclick="displaySelectedColor()">Show Selected Color</button>
    </form>

    <div id="result"></div>

    <script>
      function displaySelectedColor() {
        var colors = document.getElementsByName("color");
        var selectedColor = "";
        for(var i = 0; i < colors.length; i++) {
          if(colors[i].checked) {
            selectedColor = colors[i].value;
            break;
          }
        }
        if(selectedColor !== "") {
          document.getElementById("result").innerHTML = "Selected Color: " + selectedColor;
        } else {
          document.getElementById("result").innerHTML = "No color selected!";
        }
      }
    </script>
  </body>
</html>
