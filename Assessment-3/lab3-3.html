<!DOCTYPE html>
<html>
  <head>
    <title>Email Address Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      #info {
        font-weight: bold;
        margin-bottom: 20px;
      }
      label, input {
        display: block;
        margin-bottom: 10px;
      }
      #emailDisplay {
        margin-top: 20px;
        font-weight: bold;
        color: blue;
      }
    </style>
  </head>
  <body>
    <div id="info">
      Name: UPPALAPATI ASISH VARMA<br>
      Roll No: 24BAI0077
    </div>

    <form id="emailForm">
      <label for="fname">First Name:</label>
      <input type="text" id="fname" name="fname">

      <label for="lname">Last Name:</label>
      <input type="text" id="lname" name="lname">

      <input type="button" value="Generate Email" onclick="generateEmail(this.form)">
    </form>

    <div id="emailDisplay"></div>

    <script>
      function generateEmail(form) {
        var firstName = form.elements["fname"].value;
        var lastName = form.elements["lname"].value;
        var email = firstName + "." + lastName + "@park.edu";
        document.getElementById("emailDisplay").innerHTML = "Generated Email: " + email;
        form.reset();
        form.elements["fname"].focus();
      }
    </script>
  </body>
</html>
