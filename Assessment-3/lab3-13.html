<!DOCTYPE html>
<html>
<head>
    <title>Product Order Form</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial;
        }
        fieldset {
            margin: 15px;
            padding: 10px;
            border: 2px solid white;
        }
        button {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div id="info">
      Name: UPPALAPATI ASISH VARMA<br>
      Roll No: 24BAI0077
    </div>


<h2>Product Order Form</h2>

<form id="orderForm">

    <!-- Electronics -->
    <fieldset>
        <legend>Electronics</legend>
        <label><input type="checkbox" value="50000"> Laptop (₹50000)</label><br>
        <label><input type="checkbox" value="20000"> Mobile (₹20000)</label><br>
    </fieldset>

    <!-- Clothing -->
    <fieldset>
        <legend>Clothing</legend>
        <label><input type="checkbox" value="1500"> Jacket (₹1500)</label><br>
        <label><input type="checkbox" value="800"> Shirt (₹800)</label><br>
    </fieldset>

    <!-- Groceries -->
    <fieldset>
        <legend>Groceries</legend>
        <label><input type="checkbox" value="200"> Rice (₹200)</label><br>
        <label><input type="checkbox" value="100"> Milk (₹100)</label><br>
    </fieldset>

    <button type="button" onclick="calculateTotal()">Calculate Total</button>

</form>

<h3 id="result"></h3>

<script>
function calculateTotal() {

    let total = 0;

    // Get all checkboxes inside form
    let items = document.querySelectorAll('#orderForm input[type="checkbox"]');

    // Modern for...of loop
    for (let item of items) {
        if (item.checked) {
            total += parseFloat(item.value); // convert string to number
        }
    }

    document.getElementById("result").innerHTML = "Total Price = ₹" + total;
}
</script>

</body>
</html>
