<!DOCTYPE html>
<html>
<head>
    <title>External CSS Example</title>

    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }

        .info {
            color: darkblue;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            background-color: purple;
            text-align: center;
            padding: 10px;
        }

        p {
            color: darkgreen;
            background-color: lightyellow;
            font-size: 20px;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

    <div class="info">
        Uppalapati Asish Varma <br>
        24BAI0077
    </div>

    <h1>External CSS Implementation</h1>

    <p>
        Using external stylesheets improves reusability and consistency across multiple web pages.
    </p>

</body>
</html>
